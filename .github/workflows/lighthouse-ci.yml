name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    env:
      PORT: 3108
      NEXTAUTH_SECRET: lighthouse-ci-test-secret-32chars-min
      NEXTAUTH_URL: http://localhost:3108
      APP_BASE_URL: http://localhost:3108
      NEXT_PUBLIC_APP_URL: http://localhost:3108
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: true
          NEXTAUTH_SECRET: lighthouse-ci-test-secret-32chars-min
          NEXTAUTH_URL: http://localhost:3108
          APP_BASE_URL: http://localhost:3108
          NEXT_PUBLIC_APP_URL: http://localhost:3108

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3108
            http://localhost:3108/memos
            http://localhost:3108/board
            http://localhost:3108/inbox
            http://localhost:3108/standup
            http://localhost:3108/docs
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3

      - name: Comment PR with Lighthouse results
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## ⚡ Lighthouse CI Results

            Performance metrics have been collected. View full report in the workflow artifacts.

            📊 Measured surfaces:
            - /memos (Memos List)
            - /board (Epic Board)
            - /inbox (Inbox)
            - /standup (Standup)
            - /docs (Documentation)
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
