name: Cloud Build (GCP)

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      env:
        description: 'Deploy environment'
        required: false
        default: ''

concurrency:
  group: cloud-build-${{ github.ref }}
  # 근본원인(2026-07-06, story 6ac3e62f): true였을 때 GHA 워크플로우 실행만 취소되고 이미
  # 원격 GCP에 제출된 Cloud Build는 계속 진행돼, 연속 push 시 먼저 취소된 실행의 원격 빌드가
  # 나중 커밋의 배포를 늦게 덮어써 리비전 역전이 발생했다(GCP 이력상 동시빌드 실재 확認,
  # 07:21↔07:23 겹침). false로 직렬 큐잉해 커밋 순서=배포 순서를 보장한다.
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # Workload Identity Federation

jobs:
  cloud-build:
    name: Build & Push to Artifact Registry
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set deploy environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "target=prod" >> "$GITHUB_OUTPUT"
            echo "fastapi_url=https://sprintable-backend-prod-787818285179.asia-northeast3.run.app" >> "$GITHUB_OUTPUT"
            # ⚠️ minScale 1→3 (story #2077·prod 콜드스타트 durable, 오르테가군 PO 2026-07-23 cherry-pick):
            # dev #2074 응급대응이 dev 만 3으로 올리고 prod 는 1로 남아 2026-07-22 아침 prod 콜드스타트가
            # 재발했다. 그때 PO 가 `gcloud run services update` 로 prod minScale=3 을 라이브 적용(승인된
            # 조치)했고, 그 값은 지금도 라이브다(07-23 PO 실측 확認). 그러나 이 SSOT 는 1 로 남아 있어
            # **다음 main push 가 prod 를 1 로 되돌리는** 상태였다 — "손 값은 다음 배포가 덮는다" 교훈이
            # 정작 prod 쪽에 반영되지 않았던 것. develop 에는 #2409 로 이미 들어가 있으나 승격이 80커밋
            # 규모라, 라이브와 SSOT 를 일치시키는 이 한 줄만 먼저 main 에 못박는다(동작 변화 0).
            # conn-safe: min 3 × per-instance 5 = 15 ≤ 200(maxScale 5·rollout 70 예산 불변).
            echo "backend_min_instances=3" >> "$GITHUB_OUTPUT"
            # ⚠️ maxScale 5 (ee7794eb ③·선생님 right-size): prod g1-small max_conn 100. per-instance 5(pool
            # 3/1=4 + pg_pubsub raw 1). rollout(old+new 2×): 2×5×5+20(admin)=70 ≤ 100 ✓ (여유 30).
            # (PgBouncer 풀러 불필요 — Cloud Run raw TCP 미지원으로 중앙 PgBouncer 불가·관리형 풀링은 Enterprise Plus
            # 전용. maxScale 10 은 2×10×5+20=120>100 이라 폐기. 향후 트래픽↑ 시 tier업 동반해야 maxScale 상향.)
            echo "backend_max_instances=5" >> "$GITHUB_OUTPUT"
            # story #2005: PO 라이브 gcloud 실측(2026-07-17) — backend-prod 현재 유효 Cloud Run
            # 요청 타임아웃=300s. 지금까지 `cloudbuild.yaml`에 `--timeout` 플래그가 없어 이
            # 값은 인프라 기본값이었을 뿐 어디에도 명시돼 있지 않았다 — 이제 이 워크플로우가
            # 명시 소스가 된다(cloudbuild.yaml의 `_BACKEND_TIMEOUT` dev-safe 기본값 3600을
            # prod에서 이 output으로 override, `backend_max_instances`와 동일 배선 패턴).
            echo "backend_timeout=300" >> "$GITHUB_OUTPUT"
            echo "ga4_measurement_id=G-RYHFE7XM3X" >> "$GITHUB_OUTPUT"
          else
            echo "target=dev" >> "$GITHUB_OUTPUT"
            echo "fastapi_url=https://sprintable-backend-dev-787818285179.asia-northeast3.run.app" >> "$GITHUB_OUTPUT"
            echo "backend_min_instances=1" >> "$GITHUB_OUTPUT"
            # ⚠️ maxScale 8 (PO rev 01256-w9r right-size·durable): dev 429 근본 = Cloud Run "no available
            # instance"(maxScale 1 이 fleet 폴링 압도·3h 1345건). per-instance = pool(3/1=4·#1773) +
            # pg_pubsub raw 1 = 5. rollout(old+new 2×): 2×8×5=80 ≤ 100(PO 실측 dev DB max_conn). 이전
            # maxScale 1 은 conn-safe였으나 인스턴스 기아로 429 → load+conn 양립값. DB_POOL_SIZE=3/
            # DB_MAX_OVERFLOW=1 은 cloudbuild.yaml --update-env-vars 로 durable(lingering env 덮어씀).
            # (⚠️ dev/prod 공유 DB라면 prod(2×5×5+admin)와 합산 점검 필요 — PO 토폴로지 확認.)
            echo "backend_max_instances=8" >> "$GITHUB_OUTPUT"
            # story #2005: PO 라이브 gcloud 실측(2026-07-17) — backend-dev 현재 유효 Cloud Run
            # 요청 타임아웃=3600s(Cloud Run 요청 타임아웃 상한). cloudbuild.yaml의
            # `_BACKEND_TIMEOUT` 기본값(3600)과 동일값이라 이 output이 없어도 기본값으로
            # 굴러가지만, `backend_max_instances`와 대칭 배선을 위해 dev도 명시.
            echo "backend_timeout=3600" >> "$GITHUB_OUTPUT"
            echo "ga4_measurement_id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --substitutions=COMMIT_SHA="${{ github.sha }}",_DEPLOY_ENV="${{ steps.env.outputs.target }}",_FASTAPI_URL="${{ steps.env.outputs.fastapi_url }}",_BACKEND_MIN_INSTANCES="${{ steps.env.outputs.backend_min_instances }}",_BACKEND_MAX_INSTANCES="${{ steps.env.outputs.backend_max_instances }}",_BACKEND_TIMEOUT="${{ steps.env.outputs.backend_timeout }}",_GA4_MEASUREMENT_ID="${{ steps.env.outputs.ga4_measurement_id }}" \
            --suppress-logs \
            .
