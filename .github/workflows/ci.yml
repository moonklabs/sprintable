name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alembic-fresh-db:
    name: Alembic upgrade head (fresh DB)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sprintable
          POSTGRES_PASSWORD: sprintable
          POSTGRES_DB: sprintable_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: alembic upgrade head (fresh DB, OSS create_all shortcut)
        working-directory: backend
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test
          DATABASE_URL: postgresql+asyncpg://sprintable:sprintable@localhost:5432/sprintable_test
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          SECRET_KEY: ci-test-secret-at-least-32-chars-long
          # This job validates the OSS single-tenant fresh-install path, which uses the
          # create_all + stamp-head shortcut. SaaS/Cloud SQL never sets this flag (it runs
          # the incremental chain). NOTE: the incremental chain is NOT yet fresh-runnable
          # base->head (migration 0004 references team_members before it exists) — tracked
          # as a separate chain-repair effort. See alembic/env.py.
          SPRINTABLE_OSS_FRESH_INSTALL: "1"
        run: uv run alembic upgrade head

      - name: Verify tables created
        run: |
          PGPASSWORD=sprintable psql -h localhost -U sprintable -d sprintable_test -c \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE';" \
            | grep -E "^\s+[0-9]+"

      - name: member-ssot resolver parity (real-DB legacy vs anchor 0-diff)
        working-directory: backend
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
        run: uv run pytest tests/test_member_ssot_parity_realdb.py -q

  backend-test:
    name: Backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Run pytest
        run: cd backend && uv run pytest

  ci:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Test
        run: pnpm vitest run 2>&1 | tail -80

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          LICENSE_CONSENT: agreed
