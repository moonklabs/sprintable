name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alembic-fresh-db:
    name: Alembic upgrade head (fresh DB)
    runs-on: ubuntu-latest
    # story 8236bbc3(2026-07-03): 217초 실측(전체 스위트 3391개 대다수, 비파괴 real-DB 84개
    # 파일 포함) + 파괴적 54개 파일 격리 순회 오버헤드 버퍼. 규모상 샤딩 불요(설계 §1-D).
    timeout-minutes: 20

    services:
      postgres:
        # pgvector image: the baseline schema declares `CREATE EXTENSION vector` (embeddings),
        # which the stock postgres:16 image lacks. Cloud SQL (dev/prod) has pgvector available.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sprintable
          POSTGRES_PASSWORD: sprintable
          POSTGRES_DB: sprintable_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # story 8236bbc3: job 레벨로 승격(기존 스텝마다 중복 선언되던 5개 env var 통합) — 이 job의
    # 모든 pytest 호출(비파괴/파괴 공통)이 동일 자격증명을 쓴다.
    env:
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test
      PARITY_TEST_DATABASE_URL: postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test
      DATABASE_URL: postgresql+asyncpg://sprintable:sprintable@localhost:5432/sprintable_test
      JWT_SECRET: ci-test-secret-at-least-32-chars-long
      SECRET_KEY: ci-test-secret-at-least-32-chars-long

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      # Empty DB → alembic/env.py provisions from the baseline snapshot (schema + global seed)
      # and stamps revision 0096. This is the exact path a freshly-wiped prod takes.
      # story bda4beac: 0148(core) 재부모 후 이 checkout(develop, ee_pricing 포함)은 dual-head
      # (core 0155+ · ee_pricing 0147) — `head`(단수)는 이제 모호해 `heads`(복수)로 전환.
      - name: alembic upgrade heads (fresh DB → baseline)
        working-directory: backend
        run: uv run alembic upgrade heads

      - name: Verify tables created
        run: |
          PGPASSWORD=sprintable psql -h localhost -U sprintable -d sprintable_test -c \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE';" \
            | grep -E "^\s+[0-9]+"

      - name: Verify baseline parity (view + nullable + seed)
        run: |
          set -e
          P() { PGPASSWORD=sprintable psql -h localhost -U sprintable -d sprintable_test -tA -c "$1"; }
          test "$(P "SELECT table_type FROM information_schema.tables WHERE table_name='team_members'")" = "VIEW"
          test "$(P "SELECT is_nullable FROM information_schema.columns WHERE table_name='project_access' AND column_name='org_member_id'")" = "YES"
          test "$(P "SELECT count(*) FROM workflow_templates")" -ge 1
          test "$(P "SELECT count(*) FROM plan_features")" -ge 1
          # post-baseline incremental migration applied on a fresh DB (forward-compat): 0097 column
          test "$(P "SELECT count(*) FROM information_schema.columns WHERE table_name='org_invites' AND column_name='project_ids'")" = "1"
          # baseline REVISION invariant — the snapshot was captured at 0096; changing this without
          # regenerating baseline/schema.sql would mis-stamp fresh DBs. Lock it.
          test "$(cat backend/alembic/baseline/REVISION)" = "0096"
          # E-STORAGE-SSOT S2 (0139): asset registry 3 테이블 + asset_links source_type CHECK 적용 확인.
          test "$(P "SELECT count(*) FROM information_schema.tables WHERE table_name IN ('assets','asset_folders','asset_links')")" = "3"
          test "$(P "SELECT count(*) FROM pg_constraint WHERE conname='ck_asset_links_source_type'")" = "1"
          echo "baseline parity OK: team_members=VIEW, org_member_id nullable, seed present, 0097 applied, asset registry present, REVISION=0096"

      # story 8236bbc3: 기존 "account resolve/switch"(1개 파일)·"asset registry"(13개 파일)
      # 하드코딩 리스트 2스텝을 흡수 — real-DB 게이팅(ALEMBIC_DATABASE_URL/PARITY_TEST_DATABASE_URL)
      # 전체(파일명 무관, destructive_schema 마커 제외 84개 파일)가 자기 skipif로 자동 활성화된다.
      # 신규 real-DB 테스트 파일은 이 스텝에 아무것도 안 해도 자동 편입(누락 원천차단).
      # test_member_ssot_parity_realdb.py는 파일 자체 무조건 skip(post-cutover 불일치 — 파일
      # 상단 주석·design-ci-realdb-gap-8236bbc3 §1 참고).
      - name: Real-DB tests (non-destructive, auto-discovered via marker)
        working-directory: backend
        run: uv run pytest -q -m "not destructive_schema"

      # story bda4beac: dual-head(core+ee_pricing) checkout에서 "current == 단일 head" 비교는
      # 항상 실패한다(current가 2행이라 head=1건과 부분일치 안 됨) — 두 head 집합이 정확히
      # 일치하는지(comm -3, 차집합 0행) 비교로 교체. 단일-head 컨텍스트(main)에서도 그대로
      # 성립(양쪽 다 1행이면 차집합도 0행).
      - name: Verify fresh DB reached heads (baseline + incremental)
        working-directory: backend
        run: |
          set -e
          cur=$(uv run alembic current 2>/dev/null | grep -oE '^[0-9a-z_]+' | sort)
          heads=$(uv run alembic heads 2>/dev/null | grep -oE '^[0-9a-z_]+' | sort)
          echo "current=$cur"
          echo "heads=$heads"
          test -n "$cur"  # fresh DB is not stuck at baseline(0096) — reached at least one head
          diff <(echo "$cur") <(echo "$heads")  # current head set == full head set(전 head 도달)

      # existing-DB path: a DB already at heads must be a pure no-op — no migration re-runs.
      # (The fresh-DB run above already advanced this DB to heads via baseline + incremental.)
      - name: Existing-DB no-op (re-run upgrade heads)
        working-directory: backend
        run: |
          set -e
          out=$(uv run alembic upgrade heads 2>&1); echo "$out"
          if echo "$out" | grep -q "Running upgrade"; then
            echo "FAIL: migrations re-ran on a DB already at heads (existing-DB path not a no-op)"; exit 1
          fi
          echo "OK: existing-DB upgrade heads is a no-op"

      # story 8236bbc3: destructive_schema 마커 파일(Base.metadata.create_all/drop_all로 자체
      # 스키마 직접 관리)은 위 alembic-migrated 공유 DB(sprintable_test)에서 절대 실행하지
      # 않는다 — 실측(design doc §1-C): 단 1개 파일의 drop_all()이 DROP TABLE
      # agent_project_profiles→ForeignKeyViolationError로 DB를 오염시키고 같은 세션 후속
      # 테스트 전부가 연쇄 실패(116건). 파일마다 독립 throwaway DB(sprintable_test_iso)로
      # 완전 격리 — sprintable_test는 절대 건드리지 않는다.
      - name: Real-DB tests (destructive schema — isolated fresh DB per file)
        working-directory: backend
        run: |
          set -uo pipefail
          # ⭐set -e를 여기선 안 쓴다(로컬 e2e 시뮬레이션 실측 교훈, 2026-07-03) — 파일별
          # 루프에서 첫 실패 파일이 스크립트를 즉시 죽이면 나머지 파일은 전혀 실행되지 않고
          # 조용히 스킵된 것과 동일한 결과가 된다(이 스토리가 막으려는 바로 그 실패 유형).
          # 전체 파일을 끝까지 돌리고 실패를 누적, 마지막에 하나라도 있으면 exit 1.
          mapfile -t files < <(
            uv run pytest -q -m destructive_schema --collect-only \
              | grep -oE '^tests/[a-zA-Z0-9_]+\.py' | sort -u
          )
          echo "destructive files: ${#files[@]}"
          failed_files=()
          for f in "${files[@]}"; do
            echo "::group::isolated $f"
            PGPASSWORD=sprintable dropdb -h localhost -U sprintable --if-exists sprintable_test_iso
            PGPASSWORD=sprintable createdb -h localhost -U sprintable sprintable_test_iso
            PGPASSWORD=sprintable psql -h localhost -U sprintable -d sprintable_test_iso \
              -c 'CREATE EXTENSION IF NOT EXISTS vector;'
            ALEMBIC_DATABASE_URL=postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test_iso \
            PARITY_TEST_DATABASE_URL=postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test_iso \
            DATABASE_URL=postgresql+asyncpg://sprintable:sprintable@localhost:5432/sprintable_test_iso \
            uv run pytest -q "$f" || failed_files+=("$f")
            echo "::endgroup::"
          done
          if [ "${#failed_files[@]}" -gt 0 ]; then
            echo "FAILED files: ${failed_files[*]}"
            exit 1
          fi
          echo "OK: all ${#files[@]} isolated destructive-schema files passed"

  # story bda4beac: alembic-fresh-db(위)는 checkout된 브랜치(develop/PR)의 파일셋 기준이라
  # main이 develop과 다른 파일셋(ee_pricing 0146/0147 부재)일 때의 그래프 단절을 원천적으로
  # 못 잡는다(실제로 못 잡아서 prod 승격이 롤백된 그 사고). PR base가 main일 때만 도는 이
  # 프리플라이트가 "이 PR이 머지되면 main이 실제로 갖게 될 파일셋"으로 fresh-DB upgrade heads
  # 를 실증한다 — develop→main 승격 PR은 그 시점에 이미 main-후보 파일셋으로 체크아웃되므로
  # (선별 제외가 그 PR 자체의 diff), PR HEAD 그대로 체크아웃하면 된다.
  main-alembic-preflight:
    name: Main Alembic preflight (fresh DB, main file set)
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sprintable
          POSTGRES_PASSWORD: sprintable
          POSTGRES_DB: sprintable_main_preflight
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_main_preflight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      # ee_pricing(0146/0147)이 main 승격分에 섞여 들어왔다면 여기서 즉시 실패 — main은
      # 항상 단일 core head(0148 직계)여야 한다.
      #
      # story 21ade1fa: 0162(ee_pricing 0147 + core 0161 merge node)도 같은 이유로 제외
      # 대상 — 하지만 0146/0147과 달리 main 히스토리에 "삭제됐던 적"이 없는 신규 파일이라
      # `git merge develop`가 conflict 없이 조용히 add해버린다(dry-run 실측 확인, 2026-07-07).
      # 즉 0146/0147은 git이 알아서 걸러주지만 0162는 사람이 명시적으로 git rm 해야 하고,
      # 잊었을 때 이 assert가 없으면 실패가 알렘빅의 불친절한 KeyError로만 드러난다.
      - name: Assert main migration file set (no ee_pricing/merge-node, core 0148 present)
        working-directory: backend
        run: |
          set -e
          test -f alembic/versions/0148_org_subscriptions_org_id_unique.py
          if [ -f alembic/versions/0146_pricing_versions.py ] || [ -f alembic/versions/0147_pricing_versions_live_seed.py ]; then
            echo "FAIL: ee_pricing migration(s) present in a main-bound file set"; exit 1
          fi
          if [ -f alembic/versions/0162_merge_ee_pricing_core_heads.py ]; then
            echo "FAIL: develop-only merge node 0162 present in a main-bound file set (references ee_pricing 0147, which main doesn't have)"; exit 1
          fi
          echo "OK: main file set has 0148(core), no ee_pricing, no develop-only merge node"

      - name: Build revision graph (single head expected)
        working-directory: backend
        run: |
          set -e
          heads=$(uv run alembic heads 2>/dev/null | grep -oE '^[0-9a-z_]+')
          n=$(echo "$heads" | grep -c .)
          echo "heads=$heads (count=$n)"
          test "$n" = "1"  # main never carries the ee_pricing branch — exactly one head

      - name: Fresh-DB upgrade heads (main file set)
        working-directory: backend
        run: uv run alembic upgrade heads

  backend-test:
    name: Backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Run pytest
        run: cd backend && uv run pytest

  ci:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Test
        # set -o pipefail so vitest's non-zero exit propagates through `| tail` instead
        # of being masked by tail's 0 — without it the unit-test gate was a no-op
        # (story 2d5c8662). GitHub's default bash runner does not enable pipefail.
        run: |
          set -o pipefail
          pnpm vitest run 2>&1 | tail -80

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          LICENSE_CONSENT: agreed

      # story d3dd358b 회귀가드: shared 패키지 stale dist 소비로 zod 스키마 신규 필드가
      # silent strip되는 클래스(2026-06-10 발견, transpilePackages #1373으로 해소 확인)의
      # 재발을 clean-checkout 빌드 산출물(.next/standalone) 검사로 자동 차단.
      - name: Verify build schema integrity (story d3dd358b regression guard)
        run: pnpm --filter web verify:build-schema-integrity
