name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alembic-fresh-db:
    name: Alembic upgrade head (fresh DB)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        # pgvector image: the baseline schema declares `CREATE EXTENSION vector` (embeddings),
        # which the stock postgres:16 image lacks. Cloud SQL (dev/prod) has pgvector available.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sprintable
          POSTGRES_PASSWORD: sprintable
          POSTGRES_DB: sprintable_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      # Empty DB → alembic/env.py provisions from the baseline snapshot (schema + global seed)
      # and stamps revision 0096. This is the exact path a freshly-wiped prod takes.
      - name: alembic upgrade head (fresh DB → baseline)
        working-directory: backend
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test
          DATABASE_URL: postgresql+asyncpg://sprintable:sprintable@localhost:5432/sprintable_test
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          SECRET_KEY: ci-test-secret-at-least-32-chars-long
        run: uv run alembic upgrade head

      # 멀티계정 auth 보안 테스트는 real-DB 필수(backend-test 잡엔 PG 없음). 이 회귀(끝단 검증 부족)
      # 재발 방지 위해 PG 백드 잡에서 실행 — auth resolve/switch IDOR/replay 회귀를 CI 가 가드.
      - name: account resolve/switch real-DB tests
        working-directory: backend
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test
          DATABASE_URL: postgresql+asyncpg://sprintable:sprintable@localhost:5432/sprintable_test
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          SECRET_KEY: ci-test-secret-at-least-32-chars-long
        run: uv run pytest tests/test_account_resolve_realdb.py -q

      - name: Verify tables created
        run: |
          PGPASSWORD=sprintable psql -h localhost -U sprintable -d sprintable_test -c \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE';" \
            | grep -E "^\s+[0-9]+"

      - name: Verify baseline parity (view + nullable + seed)
        run: |
          set -e
          P() { PGPASSWORD=sprintable psql -h localhost -U sprintable -d sprintable_test -tA -c "$1"; }
          test "$(P "SELECT table_type FROM information_schema.tables WHERE table_name='team_members'")" = "VIEW"
          test "$(P "SELECT is_nullable FROM information_schema.columns WHERE table_name='project_access' AND column_name='org_member_id'")" = "YES"
          test "$(P "SELECT count(*) FROM workflow_templates")" -ge 1
          test "$(P "SELECT count(*) FROM plan_features")" -ge 1
          # post-baseline incremental migration applied on a fresh DB (forward-compat): 0097 column
          test "$(P "SELECT count(*) FROM information_schema.columns WHERE table_name='org_invites' AND column_name='project_ids'")" = "1"
          # baseline REVISION invariant — the snapshot was captured at 0096; changing this without
          # regenerating baseline/schema.sql would mis-stamp fresh DBs. Lock it.
          test "$(cat backend/alembic/baseline/REVISION)" = "0096"
          # E-STORAGE-SSOT S2 (0139): asset registry 3 테이블 + asset_links source_type CHECK 적용 확인.
          test "$(P "SELECT count(*) FROM information_schema.tables WHERE table_name IN ('assets','asset_folders','asset_links')")" = "3"
          test "$(P "SELECT count(*) FROM pg_constraint WHERE conname='ck_asset_links_source_type'")" = "1"
          echo "baseline parity OK: team_members=VIEW, org_member_id nullable, seed present, 0097 applied, asset registry present, REVISION=0096"

      # E-STORAGE-SSOT: asset registry IDOR/정합 게이트는 real-DB 가 필수(backend-test 잡엔 PG 없음).
      # 이 PG 백드 잡에서 실행해 S2~S8 IDOR/멀티테넌시 회귀를 CI 가 잡도록 박는다(까심#4).
      - name: asset registry real-DB tests (IDOR / sync / backfill / authorize)
        working-directory: backend
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test
          DATABASE_URL: postgresql+asyncpg://sprintable:sprintable@localhost:5432/sprintable_test
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          SECRET_KEY: ci-test-secret-at-least-32-chars-long
        run: uv run pytest tests/test_asset_registry_realdb.py tests/test_asset_canonical.py tests/test_attachment_authorize_asset_s3.py -q

      - name: Verify fresh DB reached head (baseline + incremental)
        working-directory: backend
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test
        run: |
          set -e
          cur=$(uv run alembic current 2>/dev/null | grep -oE '^[0-9a-z_]+' | head -1)
          head=$(uv run alembic heads 2>/dev/null | grep -oE '^[0-9a-z_]+' | head -1)
          echo "current=$cur head=$head"
          test -n "$cur" && test "$cur" = "$head"  # fresh DB is AT head, not stuck at baseline

      # existing-DB path: a DB already at head must be a pure no-op — no migration re-runs.
      # (The fresh-DB run above already advanced this DB to head via baseline + incremental.)
      - name: Existing-DB no-op (re-run upgrade head)
        working-directory: backend
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://sprintable:sprintable@localhost:5432/sprintable_test
          DATABASE_URL: postgresql+asyncpg://sprintable:sprintable@localhost:5432/sprintable_test
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          SECRET_KEY: ci-test-secret-at-least-32-chars-long
        run: |
          set -e
          out=$(uv run alembic upgrade head 2>&1); echo "$out"
          if echo "$out" | grep -q "Running upgrade"; then
            echo "FAIL: migrations re-ran on a DB already at head (existing-DB path not a no-op)"; exit 1
          fi
          echo "OK: existing-DB upgrade head is a no-op"

      # NOTE: the member-ssot real-DB parity test (tests/test_member_ssot_parity_realdb.py) was
      # removed from this gate. It validated the legacy→anchor *dual-write transition* and only
      # ever ran against the create_all schema (team_members as a writable table). The baseline
      # captures the COMPLETED cutover, where team_members is a read-only VIEW projecting the
      # anchor tables (members + project_access + agent_project_profiles) with no INSTEAD OF
      # triggers — so its fixtures (INSERT INTO team_members, agents without agent_config) are
      # structurally incompatible. The view definition now guarantees the parity invariant by
      # construction. Rewriting this test for the post-cutover schema is tracked as follow-up.

  backend-test:
    name: Backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Run pytest
        run: cd backend && uv run pytest

  ci:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Test
        # set -o pipefail so vitest's non-zero exit propagates through `| tail` instead
        # of being masked by tail's 0 — without it the unit-test gate was a no-op
        # (story 2d5c8662). GitHub's default bash runner does not enable pipefail.
        run: |
          set -o pipefail
          pnpm vitest run 2>&1 | tail -80

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          LICENSE_CONSENT: agreed
