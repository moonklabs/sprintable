# AC3: Production — external Supabase
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.example.com}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # AC5: DATABASE_URL 설정 시 컨테이너 시작 시 migration 자동 실행
      DATABASE_URL: ${DATABASE_URL:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
