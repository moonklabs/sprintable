  <text x="700" y="64" text-anchor="middle" fill="#475569" font-size="17">Next.js 15 · Supabase · MCP · Paddle · AWS Amplify · OpenCore</text>

  <!-- ============ USERS & AGENTS TIER ============ -->
  <g>
    <rect x="40" y="90" width="1320" height="120" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="60" y="114" fill="#cbd5e1" font-size="17" font-weight="600" letter-spacing="1.5">USERS &amp; AGENTS</text>

    <!-- Web Browser -->
    <g filter="url(#shadow)">
      <rect x="80" y="130" width="220" height="64" rx="8" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
      <text x="190" y="154" text-anchor="middle" fill="#e0f2fe" font-size="18" font-weight="700">Web Browser</text>
      <text x="190" y="174" text-anchor="middle" fill="#bae6fd" font-size="14">PM · Reviewer · Admin</text>
    </g>

    <!-- Claude Code -->
    <g filter="url(#shadow)">
      <rect x="420" y="130" width="220" height="64" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="530" y="154" text-anchor="middle" fill="#ede9fe" font-size="18" font-weight="700">Claude Code</text>
      <text x="530" y="174" text-anchor="middle" fill="#ddd6fe" font-size="14">MCP client · Webhook receiver</text>
    </g>

    <!-- OpenClaw -->
    <g filter="url(#shadow)">
      <rect x="760" y="130" width="220" height="64" rx="8" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="1.5"/>
      <text x="870" y="154" text-anchor="middle" fill="#fce7f3" font-size="18" font-weight="700">OpenClaw Runtime</text>
      <text x="870" y="174" text-anchor="middle" fill="#fbcfe8" font-size="14">Managed agent executor</text>
    </g>

    <!-- 3rd-party -->
