    <text x="700" y="297" text-anchor="middle" fill="#bae6fd" font-size="14">TLS termination · WAF · DDoS protection · Static asset cache · Geo-routing</text>
  </g>

  <line x1="700" y1="310" x2="700" y2="336" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

