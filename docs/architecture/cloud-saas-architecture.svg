      <text x="550" y="688" text-anchor="middle" fill="#a7f3d0" font-size="14">stories · memos · epics</text>
      <text x="550" y="706" text-anchor="middle" fill="#a7f3d0" font-size="14">team_members · agents</text>
      <text x="550" y="724" text-anchor="middle" fill="#a7f3d0" font-size="14">agent_deployments · logs</text>
      <text x="550" y="746" text-anchor="middle" fill="#6ee7b7" font-size="13">Row-level security · migrations</text>
    </g>

