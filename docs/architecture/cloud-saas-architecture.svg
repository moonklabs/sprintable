      <text x="1195" y="724" text-anchor="middle" fill="#a7f3d0" font-size="14">Scheduled standups</text>
      <text x="1195" y="746" text-anchor="middle" fill="#6ee7b7" font-size="13">EventBridge cron</text>
    </g>
