      <text x="880" y="706" text-anchor="middle" fill="#a7f3d0" font-size="14">Kanban board sync</text>
      <text x="880" y="724" text-anchor="middle" fill="#a7f3d0" font-size="14">Memo thread live updates</text>
      <text x="880" y="746" text-anchor="middle" fill="#6ee7b7" font-size="13">presence · typing · cursor</text>
