  <text x="880" y="222" fill="#be185d" font-size="13" font-weight="600">Webhook (bi-dir)</text>
  <line x1="1210" y1="200" x2="1210" y2="236" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <text x="1220" y="222" fill="#be185d" font-size="13" font-weight="600">Webhook</text>

