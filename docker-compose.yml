# Sprintable — self-hosted / local development
# Quick start: make up          (auto-generates .env with random secrets)
# Manual:      python3 scripts/init-env.py && docker compose up -d

services:
  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sprintable}
      POSTGRES_USER: ${POSTGRES_USER:-sprintable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sprintable}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sprintable}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    # image: ghcr.io/moonklabs/sprintable-backend:latest  # use pre-built image when available
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sprintable}:${POSTGRES_PASSWORD:-sprintable}@db:5432/${POSTGRES_DB:-sprintable}
      ALEMBIC_DATABASE_URL: postgresql://${POSTGRES_USER:-sprintable}:${POSTGRES_PASSWORD:-sprintable}@db:5432/${POSTGRES_DB:-sprintable}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-32-chars}
      DEBUG: "True"
    command: >
      sh -c "python bootstrap.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    # image: ghcr.io/moonklabs/sprintable-frontend:latest  # use pre-built image when available
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_FASTAPI_URL: http://backend:8000
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3108
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3108}
      NEXT_PUBLIC_APP_URL: ${APP_BASE_URL:-http://localhost:3108}
      NEXT_PUBLIC_FASTAPI_URL: http://backend:8000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
    ports:
      - "${PORT:-3108}:3108"
