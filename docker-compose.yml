# Sprintable — self-hosted / local development
# Usage: cp .env.example .env  &&  docker compose up -d

services:
  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sprintable}
      POSTGRES_USER: ${POSTGRES_USER:-sprintable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sprintable}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sprintable}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sprintable}:${POSTGRES_PASSWORD:-sprintable}@db:5432/${POSTGRES_DB:-sprintable}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-32-chars}
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v2/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_FASTAPI_URL: http://backend:8000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
    ports:
      - "${PORT:-3000}:3000"
