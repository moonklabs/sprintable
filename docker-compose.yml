# Sprintable — self-hosted / local development
# Quick start: make up          (auto-generates .env with random secrets)
# Manual:      python3 scripts/init-env.py && docker compose up -d

services:
  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sprintable}
      POSTGRES_USER: ${POSTGRES_USER:-sprintable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sprintable}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sprintable}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    # image: ghcr.io/moonklabs/sprintable-backend:latest  # use pre-built image when available
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sprintable}:${POSTGRES_PASSWORD:-sprintable}@db:5432/${POSTGRES_DB:-sprintable}
      ALEMBIC_DATABASE_URL: postgresql://${POSTGRES_USER:-sprintable}:${POSTGRES_PASSWORD:-sprintable}@db:5432/${POSTGRES_DB:-sprintable}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-32-chars}
      DEBUG: "True"
      # NOTE: a fresh OSS DB now provisions via the squashed baseline migration (revision 0096),
      # which builds the exact, view-aware schema + global system seed. We deliberately do NOT set
      # SPRINTABLE_OSS_FRESH_INSTALL anymore — the create_all shortcut builds from the (drifted)
      # models and would miss the team_members VIEW etc. `bootstrap.py` → `alembic upgrade heads`
      # (story bda4beac: plural — ee_pricing branched as a separate head) runs the baseline.
      # The flag remains an explicit opt-in escape hatch only.
      # Self-hosted installs usually have no email provider configured, so verification
      # emails never arrive and org creation would 403 forever. Code default stays True
      # (hosted behavior preserved) — compose relaxes it for the local stack.
      REQUIRE_VERIFIED_EMAIL_FOR_ORG_CREATE: "False"
      # Backend builds verification links from NEXT_PUBLIC_APP_URL (defaults to the hosted
      # domain) — point it at this instance so console-fallback links actually work here.
      NEXT_PUBLIC_APP_URL: ${APP_BASE_URL:-http://localhost:3108}
      # Agent chat file uploads (POST /api/v2/channel/upload)
      CHANNEL_FILES_DIR: /app/data/channel_files
    volumes:
      - ./data/channel_files:/app/data/channel_files
    command: >
      sh -c "python bootstrap.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    # image: ghcr.io/moonklabs/sprintable-frontend:latest  # use pre-built image when available
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_FASTAPI_URL: http://backend:8000
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3108
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3108}
      NEXT_PUBLIC_APP_URL: ${APP_BASE_URL:-http://localhost:3108}
      NEXT_PUBLIC_FASTAPI_URL: http://backend:8000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
    ports:
      - "${PORT:-3108}:3108"
