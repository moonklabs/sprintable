# D-S2/D-S7: Cloud Build — Frontend + Backend 멀티 이미지 빌드
# GCP 프로젝트: sprintable-494803 | 리전: asia-northeast3
#
# 트리거: main→prod, develop→dev (GitHub Actions cloud-build.yml)
# 이미지 태그: $COMMIT_SHA + $ENV (latest-dev / latest-prod)
# 캐시: Artifact Registry 레이어 캐시

substitutions:
  _AR_REGION: asia-northeast3
  _AR_REPO: sprintable
  _DEPLOY_ENV: dev
  _FASTAPI_URL: https://sprintable-backend-dev-787818285179.asia-northeast3.run.app
  _BACKEND_MIN_INSTANCES: '1'
  # ⚠️ default '1'(아래) = _DEPLOY_ENV:dev default 와 정합한 **dev-safe fallback**(수동 `gcloud builds submit`
  #    override 없을 때 무리한 maxScale 재현 차단). GHA cloud-build.yml 이 per-env override(prod=5·dev=8, #2074 응급).
  #    rollout-safe 산식(ee7794eb·dev TooManyConnections 인시던트): **2 × maxScale × (pool+overflow + raw) +
  #    headroom ≤ max_conn**. per-instance = pool(3/1=4) + pg_pubsub raw(1) = 5.
  #    ⚠️ story #2040(2026-07-20) PO gcloud 실측 갱신 — max_connections이 dev/prod 둘 다 **200**이다
  #    (dev는 100→200 그날 사고대응으로 상향). 이 주석이 한동안 100 가정으로 낡아 있었다(codex #2074
  #    조사가 재적발) — SSOT는 `docs/db-connection-budget.md`, 값 바뀌면 그 문서와 여기를 같이 갱신할 것.
  #    prod: maxScale 5 → 2×5×5+20=70 ≤ 200(여유 65%). dev: maxScale 8 → 2×8×5=80 ≤ 200(여유 60%).
  #    (PgBouncer 풀러: Cloud Run raw TCP 미지원으로 중앙 불가·관리형 풀링 Enterprise Plus 전용 → #1779
  #    폐기 이력 있음. 트래픽↑ 時 아키텍처 재검토(#2074) 필요.)
  _BACKEND_MAX_INSTANCES: '1'
  _GA4_MEASUREMENT_ID: ""  # dev 기본값 빈 문자열 — prod 트리거에서 G-RYHFE7XM3X 주입
  # story #2078(E-ARCH 0단계) — SSE 멀티플렉서 롤백 플래그. dev-safe 기본값 'false'(수동
  # `gcloud builds submit` override 없을 때 안전). GHA가 dev 브랜치에서만 'true' 주입 —
  # prod는 develop→main 일괄승격에 검증 안 된 플래그를 얹지 않는다(오르테가군 판정,
  # 2026-07-21 — 문제 생기면 48커밋 중 원인 격리 불가라 별도 판단으로 미룸).
  _SSE_MULTIPLEX_ENABLED: "false"
  # story #2005(Phase B P1-c, E-A2A-PROTO 리라이어빌리티): Cloud Run 요청 타임아웃이
  # `deploy-backend` 스텝에 `--timeout` 플래그로 명시된 적이 한 번도 없어(grep 확認) 인프라
  # 기본값에 암묵 의존 중이었다(A2A `/rpc` 특히 `SendStreamingMessage` SSE가 사실상 무기한
  # 실행되는 배경). PO가 라이브 `gcloud`로 실측한 현재 유효값(2026-07-17, 이 세션은 gcloud
  # 접근 없이 그 실측을 신뢰): backend-prod=300s · backend-dev=3600s · mcp-prod=300s
  # (concurrency=80). 아래 기본값(3600)은 `_DEPLOY_ENV: dev` 기본값과 정합한 dev-safe
  # fallback(위 `_BACKEND_MIN_INSTANCES` 주석과 동일 컨벤션) — dev 측정값을 그대로 명시해
  # "인프라 기본값 암묵 의존"에서 "이 파일에 명시된 의도값"으로 전환한다. prod override(300)는
  # `.github/workflows/cloud-build.yml`의 `steps.env`(브랜치별 backend_timeout 산출 후
  # `--substitutions`로 주입, `_BACKEND_MAX_INSTANCES`와 동일 배선)에서 온다 — 이 저장소의
  # "트리거"는 별도 GCP Cloud Build Trigger 리소스가 아니라 그 GHA 워크플로우 자체(파일 상단
  # 주석 "트리거: main→prod, develop→dev (GitHub Actions cloud-build.yml)" 참조)라 prod override
  # 도 이 레포 안에서 완결된다(PO/infra-lane이 GCP 콘솔에서 별도로 설정할 트리거-레벨
  # override는 존재하지 않음 — 확認 후 아래 GHA 워크플로우도 함께 배선함).
  _BACKEND_TIMEOUT: '3600'

  # E-ARCH 1단계(story #2078·PR #2358 PG_LISTEN_ENABLED 배선): SSE/LISTEN 전용
  # `sprintable-realtime-${_DEPLOY_ENV}` 서비스 — REST(`sprintable-backend-*`)와 같은 이미지,
  # PG_LISTEN_ENABLED만 다르다(realtime=true·api는 FE 전환 후 PO가 별도로 false 배선 예정,
  # 이 파일은 아직 손대지 않는다 — 순서 뒤바뀌면 FE 전환 전에 api LISTEN이 꺼져 실시간이 죽는다).
  # 아래 기본값은 PO가 2026-07-21 dev에 손으로 생성·검증한 실측값을 그대로 옮긴 것
  # (`gcloud run services describe sprintable-realtime-dev` 대조 완료) — "손 값은 다음
  # 배포가 덮는다" 규율대로 이 파일에 명시해 durable화한다. 장수 SSE 연결이 콜드스타트에
  # 끊기지 않도록 minScale 2(backend는 3) · timeout 3600(요청 타임아웃 상한).
  _REALTIME_MIN_INSTANCES: '2'
  _REALTIME_MAX_INSTANCES: '8'
  _REALTIME_TIMEOUT: '3600'
  _REALTIME_URL: https://sprintable-realtime-dev-787818285179.asia-northeast3.run.app

  # story c4c72eb1 후속(2026-07-22, GCE 조사 중 발견): `deploy-frontend` 스텝에 `--timeout`
  # 플래그가 한 번도 없었다(story #2005가 backend에서 고친 것과 동형 결함, frontend는
  # 그 처리를 안 받았음) — 인프라 기본값이 아니라 `deploy_frontend.sh`의 옛 `--timeout=60`
  # (일반 페이지 요청 기준값, `/api/event-stream` SSE 프록시 라우트 생긴 뒤 재검토 안 됨)이
  # `gcloud run deploy`의 "플래그 생략 시 기존 값 preserve" 동작으로 암묵 지속되고 있었다.
  # 라이브 실측(2026-07-22, dev/prod 둘 다 60) 그대로 여기 명시해 durable화 — **값을 올리는
  # 것이 아니라 지금 값을 IaC에 고정하는 것**(오르테가군 판정: frontend concurrency=80·
  # maxScale=3(상한 240·짧은 페이지 요청용 sizing) vs realtime concurrency=80·maxScale=8
  # (상한 640·SSE용 sizing) — SSE를 frontend에 오래 붙들면 그 작은 상한을 페이지 요청과
  # 다투게 만드는 새 병목이라, 값 인상은 브라우저→realtime 직결 설계(B) 이후로 미룸).
  _FRONTEND_TIMEOUT: '60'

  # E-ARCH 1단계 durable화 마지막 조각(story #2078, 2026-07-21 PO 손 플립 확認 후): api
  # (sprintable-backend-*)의 PG_LISTEN_ENABLED. ⚠️ 기본값 'true' — prod는 아직
  # sprintable-realtime-prod가 없다(deploy-realtime 스텝이 prod에서 스킵 중, PO 검증 전).
  # prod api를 false로 먼저 못박으면 prod 승격 시점에 LISTEN 하는 서비스가 하나도 없어
  # 실시간이 완전히 죽는 landmine이 된다 — 그래서 dev만 GHA에서 명시 override(false)하고
  # prod는 이 fallback(true)을 그대로 상속해 오늘 이전과 동일 동작을 유지한다. prod가
  # sprintable-realtime-prod 배선을 마치는 승격 시점에 GHA prod 분기에도 false를 명시할 것.
  _BACKEND_PG_LISTEN_ENABLED: 'true'

  # E-ARCH S2 정리(story #2078, 2026-07-21): api는 SSE를 서빙하지 않으니(realtime으로 이관
  # 완료) Redis 구독(consume) 자체가 불필요 — dual_publish(발행)는 여전히 필요(cross-instance
  # relay 소스가 되어야 하므로 안 건드림). 기본값 'false'(api 전용 durable 값) — 이 값은
  # deploy-backend에서만 쓰이고 deploy-realtime은 항상 true를 직접 명시(아래, 변수 아님).
  _BACKEND_REDIS_CONSUME_ENABLED: 'false'

  # ⛔story cd10e123 계열 긴급수정(2026-07-21, codex 리서치 검증 중 적발): REDIS_URL·
  # EVENT_BROKER_REDIS_DUAL_PUBLISH_ENABLED가 여태 여기 어디에도 없는 순수 수동 Cloud Run env
  # 였다 — PG_LISTEN_ENABLED는 durable화됐는데(위) 이 둘은 안 돼서, 서비스가 `--set-env-vars`로
  # 재배포/재생성되면 dispatch 관련 플래그가 조용히 기본값(false/None)으로 되돌아가고 LISTEN은
  # 이미 꺼져있어 **두 전송경로 동시 무효화(실시간 전면정지)** 조건이 성립한다. 기본값은
  # dev-safe fallback(REDIS 미설정 상태와 동등 — config.py의 "fail-safe if not configured"
  # 로직이 그대로 우아하게 no-op) — GHA가 dev/prod 실측값으로 override.
  _REDIS_URL: ''
  _BACKEND_REDIS_DUAL_PUBLISH_ENABLED: 'false'

steps:
  # ─── Frontend (Next.js standalone) ────────────────────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - -f
      - apps/web/Dockerfile
      - -t
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${COMMIT_SHA}
      - -t
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:latest-${_DEPLOY_ENV}
      - --build-arg
      - NEXT_PUBLIC_FASTAPI_URL=${_FASTAPI_URL}
      - --build-arg
      - NEXT_PUBLIC_OAUTH_ENABLED=true
      - --build-arg
      - NEXT_PUBLIC_GA4_MEASUREMENT_ID=${_GA4_MEASUREMENT_ID}
      - --build-arg
      - NEXT_PUBLIC_SSE_MULTIPLEX_ENABLED=${_SSE_MULTIPLEX_ENABLED}
      - .
    env:
      - DOCKER_BUILDKIT=1

  # ─── Backend (FastAPI) ─────────────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${COMMIT_SHA}
      - -t
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest-${_DEPLOY_ENV}
      - --cache-from
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest-${_DEPLOY_ENV}
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - ./backend
    env:
      - DOCKER_BUILDKIT=1

  # ─── Push images ──────────────────────────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend
    waitFor: [build-frontend]

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend
    waitFor: [build-backend]

  # ─── Migrate DB (story dbda0baf, E-RECRUIT S13) ────────────────────────────
  # 근본원인(2026-07-05 dev 인시던트): migrate 잡이 파이프라인과 완전히 분리돼 있어 ⓐ
  # provision_migrate_job.sh 를 COMMIT_SHA 없이 수동 실행하면 마지막 `latest-${ENV}` 태그에
  # 조용히 고정되고(mutable·드리프트) ⓑ 잡 자체가 인라인 `head`(단수)로 수동 override 돼
  # migrate.sh(정본 `heads` 복수)를 안 타는 상태였다. 매 배포마다 잡을 SHA-pinned 이미지 +
  # canonical command(`/app/scripts/migrate.sh`)로 강제 재배포해 드리프트가 다시 쌓일 수 없게 한다.
  - id: update-migrate-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        GCP_PROJECT="${PROJECT_ID}" GCP_REGION="${_AR_REGION}" AR_REPO="${_AR_REPO}" COMMIT_SHA="${COMMIT_SHA}" \
          bash backend/scripts/provision_migrate_job.sh ${_DEPLOY_ENV}
    waitFor: [push-backend]

  # `gcloud run jobs execute --wait`는 잡 실패 시 비-0 exit → 이 스텝이 실패 → Cloud Build가
  # 빌드 전체를 실패 처리하고 뒤따르는 deploy-backend(waitFor 의존)는 아예 실행되지 않는다
  # (migrate 실패 시 배포 자동 abort — "잡 성공≠앱DB 배포" 상태가 재발할 수 없음). 실패는
  # Cloud Build 로그 + GHA 워크플로우 실패(빨간 X·커밋 상태)로 가시화된다.
  - id: run-migrate-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - sprintable-migrate-${_DEPLOY_ENV}
      - --region=${_AR_REGION}
      - --wait
    waitFor: [update-migrate-job]

  # ─── Deploy to Cloud Run ───────────────────────────────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - sprintable-frontend-${_DEPLOY_ENV}
      - --image=${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${COMMIT_SHA}
      - --region=${_AR_REGION}
      - --timeout=${_FRONTEND_TIMEOUT}
      # E-ARCH 1단계(story #2078) — /api/event-stream 프록시 라우트가 REALTIME_URL을 읽어
      # SSE/LISTEN 전용 realtime-gateway로 향한다(REALTIME_URL 없으면 기존 FASTAPI_URL로
      # 폴백 — 이 값을 비우면 코드 변경·재배포 없이 즉시 원복). --update-env-vars(additive).
      - --update-env-vars=REALTIME_URL=${_REALTIME_URL}
      - --quiet
    waitFor: [push-frontend]

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - sprintable-backend-${_DEPLOY_ENV}
      - --image=${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${COMMIT_SHA}
      - --region=${_AR_REGION}
      - --min-instances=${_BACKEND_MIN_INSTANCES}
      - --max-instances=${_BACKEND_MAX_INSTANCES}
      # story #2005: 요청 타임아웃 명시화(위 `_BACKEND_TIMEOUT` 주석 참조) — 이전엔 이 플래그
      # 자체가 없어 Cloud Run 인프라 기본값에 암묵 의존했다.
      - --timeout=${_BACKEND_TIMEOUT}
      # ⭐frontend 가 NEXT_PUBLIC_FASTAPI_URL 로 backend 를 직접 호출(public 필수). 플래그 없으면
      # gcloud run deploy 가 기존 IAM 을 preserve(non-deterministic) → 신규/리셋 시 allUsers invoker
      # 유실로 403(2026-06-21 prod promotion 사건). 명시적·멱등 설정으로 매 배포 public 보장(dev/prod 공통).
      - --allow-unauthenticated
      # OB-1: 에이전트 onboarding generator 가 읽는 backend-direct URL 을 런타임 env 로 주입.
      # ⚠️ 반드시 --update-env-vars(additive·기존 backend env[DATABASE_URL 등] 보존). --set-env-vars 금지
      # (전체 wipe). _FASTAPI_URL 은 dev/prod 각 backend-direct run.app(프론트 NEXT_PUBLIC_FASTAPI_URL 과 동일 값).
      # DB_POOL_SIZE=3/DB_MAX_OVERFLOW=1: config.py 기본과 동일하나 **명시 주입으로 durable**(과거 수동 설정·
      # lingering env 가 config 기본을 덮는 것 방지). rollout 산식: 2×maxScale×(pool+overflow+pg_pubsub raw 1)
      # ≤ DB max_conn (dev maxScale 8: 2×8×5=80 · prod maxScale 5: 2×5×5=50+admin). 변경 시 cloud-build.yml
      # maxScale 와 짝으로 검토. (PO rev 01256 dev 429 right-size durable 화.)
      # E-ARCH 1단계(story #2078): PG_LISTEN_ENABLED durable화 — 위 _BACKEND_PG_LISTEN_ENABLED
      # 주석 참조(dev=false·prod=true 유지, GHA per-env 배선).
      # E-ARCH S2 정리(story #2078): REDIS_CONSUME_ENABLED durable화 — 위 _BACKEND_REDIS_
      # CONSUME_ENABLED 주석 참조(api는 SSE 미서빙이라 구독 불필요, dual_publish는 유지).
      # ⛔story cd10e123 긴급수정(2026-07-21, codex 리서치 검증 중 적발): REDIS_URL·
      # EVENT_BROKER_REDIS_DUAL_PUBLISH_ENABLED durable화 — 위 _REDIS_URL 주석 참조.
      - --update-env-vars=FASTAPI_URL=${_FASTAPI_URL},DB_POOL_SIZE=3,DB_MAX_OVERFLOW=1,PG_LISTEN_ENABLED=${_BACKEND_PG_LISTEN_ENABLED},REDIS_CONSUME_ENABLED=${_BACKEND_REDIS_CONSUME_ENABLED},REDIS_URL=${_REDIS_URL},EVENT_BROKER_REDIS_DUAL_PUBLISH_ENABLED=${_BACKEND_REDIS_DUAL_PUBLISH_ENABLED}
      - --quiet
    # story dbda0baf: push-backend → run-migrate-job(위) 로 변경 — 신규 코드가 마이그 안 된
    # 스키마를 상대로 뜨는 걸 막는다(migrate 실패 시 이 스텝 자체가 안 돎).
    waitFor: [run-migrate-job]

  # E-ARCH 1단계(story #2078): sprintable-realtime-${_DEPLOY_ENV} — SSE/LISTEN 전용 서비스,
  # deploy-backend와 동일 이미지·동일 시크릿 상속(--set-secrets 없는 gcloud run deploy
  # 컨벤션 그대로 — 기존 바인딩 preserve). ⚠️ prod는 PO 검증 전이라 게이트: _DEPLOY_ENV가
  # dev가 아니면 스킵(서비스 미존재 상태에서 이 스텝이 자동 생성해버리는 것 방지 — 프로덕션
  # 승격 시점에 이 가드를 열고 _REALTIME_* 값을 prod로 배선).
  - id: deploy-realtime
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [ "${_DEPLOY_ENV}" != "dev" ]; then
          echo "skip deploy-realtime: prod gate pending (E-ARCH 1단계 dev 검증 후 오픈)"
          exit 0
        fi
        # ⚠️story #2078 긴급수정(2026-07-21): PG_LISTEN_ENABLED가 여기 true로 하드코딩돼
        # 있었다 — PO가 라이브에서 손으로 false로 전환(LISTEN 제거·Redis 단독 dispatch 확認
        # 완료)했는데, 이 스텝이 명시적으로 true를 다시 밀어넣어 **다음 배포마다 LISTEN이
        # 부활**하는 시한폭탄이었다("손 값은 배포가 덮는다" 규율의 역방향 재발 — 이번엔 배포가
        # 고침을 지우는 쪽). realtime은 이제 LISTEN이 구조적으로 불필요(Redis가 authoritative
        # dispatch) — false로 durable 고정. REDIS_CONSUME_ENABLED=true도 명시(이 서비스가
        # Redis를 구독+dispatch하는 유일한 서비스라는 것을 코드에 못박음 — api는 false).
        # ⛔story cd10e123 긴급수정(2026-07-21, codex 리서치 검증 중 적발): REDIS_URL·
        # EVENT_BROKER_REDIS_DUAL_PUBLISH_ENABLED·EVENT_BROKER_REDIS_DISPATCH_ENABLED 셋 다
        # 여태 여기 없는 순수 수동 Cloud Run env였다 — realtime은 이미 LISTEN이 꺼져있고
        # Redis가 유일한 dispatch 경로라, 이 서비스가 재배포/재생성될 때 이 셋이 기본값
        # (false/None)으로 되돌아가면 두 전송경로 동시 무효화(실시간 전면정지)가 된다.
        # 이 스텝은 이미 dev 전용 가드(위) 안이라 true를 직접 명시해도 안전(PG_LISTEN_ENABLED=
        # false와 동일 컨벤션) — REDIS_URL만 변수(연결문자열은 환경별로 다르므로).
        gcloud run deploy sprintable-realtime-${_DEPLOY_ENV} \
          --image=${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${COMMIT_SHA} \
          --region=${_AR_REGION} \
          --min-instances=${_REALTIME_MIN_INSTANCES} \
          --max-instances=${_REALTIME_MAX_INSTANCES} \
          --timeout=${_REALTIME_TIMEOUT} \
          --allow-unauthenticated \
          --update-env-vars=FASTAPI_URL=${_REALTIME_URL},DB_POOL_SIZE=3,DB_MAX_OVERFLOW=1,PG_LISTEN_ENABLED=false,REDIS_CONSUME_ENABLED=true,REDIS_URL=${_REDIS_URL},EVENT_BROKER_REDIS_DUAL_PUBLISH_ENABLED=true,EVENT_BROKER_REDIS_DISPATCH_ENABLED=true \
          --quiet
    waitFor: [run-migrate-job]

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
