# D-S2/D-S7: Cloud Build — Frontend + Backend 멀티 이미지 빌드
# GCP 프로젝트: sprintable-494803 | 리전: asia-northeast3
#
# 트리거: main→prod, develop→dev (GitHub Actions cloud-build.yml)
# 이미지 태그: $COMMIT_SHA + $ENV (latest-dev / latest-prod)
# 캐시: Artifact Registry 레이어 캐시

substitutions:
  _AR_REGION: asia-northeast3
  _AR_REPO: sprintable
  _DEPLOY_ENV: dev
  _FASTAPI_URL: https://sprintable-backend-dev-787818285179.asia-northeast3.run.app
  _BACKEND_MIN_INSTANCES: '1'
  # ⚠️ 이 값은 **GHA cloud-build.yml 이 per-env override**(dev=1·prod=10) — 이 default 는 수동 빌드 fallback.
  #    maxScale 10 history: 429 포화(2026-06-09)→#1330 가속→steady 10×8=80<100 "viable" 판단이었으나
  #    **rollout(old+new 2×) 누락**이었음(ee7794eb·dev TooManyConnections). rollout per-instance = pool(4)
  #    + pg_pubsub raw(1) = 5 → 2×10×5+20=120 > 100. 즉 maxScale 10 은 **PgBouncer(DB_PGBOUNCER·연결
  #    decouple) 또는 tier↑ 전제**. dev(f1-micro 25)는 maxScale 1(2×1×5+5=15≤25)로 cloud-build.yml 에서 강제.
  _BACKEND_MAX_INSTANCES: '10'
  _GA4_MEASUREMENT_ID: ""  # dev 기본값 빈 문자열 — prod 트리거에서 G-RYHFE7XM3X 주입
  # ③ 중앙 PgBouncer(ee7794eb): prod 만 on. cloud-build.yml(GHA)이 per-env override(prod=true+시크릿名·dev=false).
  # on 時 deploy 가 DATABASE_URL→PgBouncer 서비스·DATABASE_URL_DIRECT→Cloud SQL 시크릿 주입(시크릿 값은 PO·이름만 참조).
  _DB_PGBOUNCER: 'false'
  _DATABASE_URL_SECRET: ''          # prod: DATABASE_URL_PROD_PGB (→PgBouncer:6432)
  _DATABASE_URL_DIRECT_SECRET: ''   # prod: DATABASE_URL_DIRECT_PROD (→Cloud SQL 직결·pg_pubsub LISTEN)

steps:
  # ─── Frontend (Next.js standalone) ────────────────────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - -f
      - apps/web/Dockerfile
      - -t
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${COMMIT_SHA}
      - -t
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:latest-${_DEPLOY_ENV}
      - --build-arg
      - NEXT_PUBLIC_FASTAPI_URL=${_FASTAPI_URL}
      - --build-arg
      - NEXT_PUBLIC_OAUTH_ENABLED=true
      - --build-arg
      - NEXT_PUBLIC_GA4_MEASUREMENT_ID=${_GA4_MEASUREMENT_ID}
      - .
    env:
      - DOCKER_BUILDKIT=1

  # ─── Backend (FastAPI) ─────────────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${COMMIT_SHA}
      - -t
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest-${_DEPLOY_ENV}
      - --cache-from
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:latest-${_DEPLOY_ENV}
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - ./backend
    env:
      - DOCKER_BUILDKIT=1

  # ─── Push images ──────────────────────────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend
    waitFor: [build-frontend]

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend
    waitFor: [build-backend]

  # ─── Deploy to Cloud Run ───────────────────────────────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - sprintable-frontend-${_DEPLOY_ENV}
      - --image=${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${COMMIT_SHA}
      - --region=${_AR_REGION}
      - --quiet
    waitFor: [push-frontend]

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    # ③ PgBouncer: prod 만 DATABASE_URL→PgBouncer·DATABASE_URL_DIRECT→Cloud SQL 시크릿을 조건부 주입해야 해
    # bash 분기로 전환(dev 는 base·DATABASE_URL out-of-band 보존). 기존 플래그/주의는 그대로 유지.
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        DEPLOY_ARGS=(
          run deploy "sprintable-backend-${_DEPLOY_ENV}"
          "--image=${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/backend:${COMMIT_SHA}"
          "--region=${_AR_REGION}"
          "--min-instances=${_BACKEND_MIN_INSTANCES}"
          "--max-instances=${_BACKEND_MAX_INSTANCES}"
          # ⭐public 필수(2026-06-21 prod 403 사건)·멱등 보장(dev/prod 공통).
          --allow-unauthenticated
          # ⚠️ --update-env-vars(additive·기존 DATABASE_URL 등 보존). --set-env-vars 금지(전체 wipe).
          # FASTAPI_URL=backend-direct run.app · DB_PGBOUNCER=prod만 true(③·cloud-build.yml per-env).
          "--update-env-vars=FASTAPI_URL=${_FASTAPI_URL},DB_PGBOUNCER=${_DB_PGBOUNCER}"
          --quiet
        )
        # ③ prod-only: DATABASE_URL→PgBouncer 시크릿·DATABASE_URL_DIRECT→Cloud SQL 시크릿 주입(값은 PO·이름 참조).
        # dev(_DB_PGBOUNCER=false)는 미주입 → DATABASE_URL out-of-band 보존(현 동작 무변경).
        if [ "${_DB_PGBOUNCER}" = "true" ]; then
          DEPLOY_ARGS+=( "--update-secrets=DATABASE_URL=${_DATABASE_URL_SECRET}:latest,DATABASE_URL_DIRECT=${_DATABASE_URL_DIRECT_SECRET}:latest" )
        fi
        gcloud "${DEPLOY_ARGS[@]}"
    waitFor: [push-backend]

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
