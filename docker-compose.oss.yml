# Sprintable OSS — Single container, SQLite, no Supabase
# Usage: docker compose -f docker-compose.oss.yml up
# Target: <60s cold start, TTHW <2min

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.oss
    ports:
      - "3108:3000"
    environment:
      OSS_MODE: "true"
      NEXT_PUBLIC_OSS_MODE: "true"
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3108}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3108}
      AGENT_API_KEY_SECRET: ${AGENT_API_KEY_SECRET:-changeme-agent-api-key-secret}
      CRON_SECRET: ${CRON_SECRET:-changeme-cron-secret}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - sprintable-data:/app/data
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  sprintable-data:
